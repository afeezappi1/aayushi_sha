<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aayushi Sha | Protocol 10-04</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #08010a;
            --primary: #ff2e63; /* Rose Red */
            --secondary: #08d9d6; /* Electric Teal */
            --text-main: #eaeaea;
            --font-stack: 'VT323', monospace;
        }

        body {
            margin: 0; background: var(--bg-color);
            color: var(--primary); font-family: var(--font-stack);
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* TERMINAL STYLE */
        #terminal {
            width: 80%; max-width: 750px;
            height: 60vh; font-size: 1.7rem;
            text-shadow: 0 0 10px rgba(255, 46, 99, 0.3);
            overflow: hidden; transition: opacity 2.5s ease;
        }

        .line { margin-bottom: 18px; line-height: 1.2; }
        .prompt { color: var(--secondary); margin-right: 12px; }
        .cursor {
            display: inline-block; width: 12px; height: 1.2em;
            background-color: var(--primary);
            animation: blink 1.2s infinite; vertical-align: middle;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* SURPRISE CONTAINER */
        #surprise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 4s cubic-bezier(0.4, 0, 0.2, 1);
            background: radial-gradient(circle at center, #1a021d 0%, #08010a 100%);
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 0; }

        /* TEASING MESSAGES */
        #message-display {
            font-size: 2.8rem; color: #fff; text-align: center;
            z-index: 10; min-height: 150px; transition: opacity 2s ease;
            max-width: 85%; line-height: 1.4;
            text-shadow: 0 0 25px var(--primary);
        }

        .heart-loader {
            font-size: 6rem; z-index: 10; margin-bottom: 20px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-5deg); filter: drop-shadow(0 0 10px var(--primary)); }
            50% { transform: translateY(-20px) rotate(5deg); filter: drop-shadow(0 0 30px var(--secondary)); }
        }

        .reveal-btn {
            background: transparent; border: 2px solid var(--secondary);
            color: var(--secondary); padding: 15px 35px;
            font-family: var(--font-stack); font-size: 1.5rem;
            cursor: pointer; transition: 0.8s; margin-top: 30px;
            z-index: 20; opacity: 0; letter-spacing: 2px;
        }

        .reveal-btn:hover { background: var(--secondary); color: #000; box-shadow: 0 0 40px var(--secondary); }

        /* THE FINAL DESTINATION SLIDE */
        #final-slide {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }

        .typed-final { color: #fff; font-size: 2.2rem; max-width: 700px; text-align: center; padding: 40px; }
    </style>
</head>
<body>

    <div id="terminal"></div>

    <div id="surprise">
        <canvas id="starfield"></canvas>
        <div class="heart-loader">⚡</div>
        <div id="message-display"></div>
        <button id="final-trigger" class="reveal-btn" onclick="openFinal()">INITIALIZE FINAL TRUTH</button>
    </div>

    <div id="final-slide">
        <div class="typed-final" id="final-text"></div>
        <div style="margin-top: 50px; color: var(--primary); font-size: 1.5rem; opacity: 0; animation: fadeIn 4s forwards 6s;">
            -- Yours truly, Afeez 💫
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const sleep = ms => new Promise(r => setTimeout(r, ms));

        async function typeTerminal(text, speed = 80) {
            const line = document.createElement('div');
            line.className = 'line';
            line.innerHTML = `<span class="prompt">Aayushi_sha@world_traveler:~$</span><span class="msg"></span><span class="cursor"></span>`;
            terminal.appendChild(line);
            const msgSpan = line.querySelector('.msg');
            const cursor = line.querySelector('.cursor');

            for (let char of text) {
                msgSpan.textContent += char;
                await sleep(speed + Math.random() * 50);
            }
            cursor.style.display = 'none';
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function startFlow() {
            await sleep(1500);
            await typeTerminal("Scanning coordinates... Destination: Aayushi's Day.");
            await typeTerminal("Hardware Check: Sensors indicate 100% charm.");
            await sleep(1000);
            await typeTerminal("Wait... detecting a 'Super Cool Electronics Girl' profile.");
            await typeTerminal("Analyzing Ayyushi Sha...");
            await typeTerminal("Result: A perfect 22-year loop of beauty and brains.");
            await sleep(1200);
            await typeTerminal("Warning: Traveling through her timeline may cause dizziness.");
            await typeTerminal("Why? Because she's been running through my mind all day.");
            await sleep(1500);
            await typeTerminal("Decryption complete. Opening the Universe for her...");
            await sleep(2000);

            terminal.style.opacity = "0";
            await sleep(2500);
            showSurprise();
        }

        async function showSurprise() {
            document.getElementById('surprise').style.opacity = "1";
            document.getElementById('surprise').style.pointerEvents = "auto";
            initStars();

            const jokes = [
                "Hey Aayushi... ✨",
                "I was going to build you a robot for your birthday,",
                "But how can I build something...",
                "...that's more advanced than you? 😉",
                "22 years of Aayushi Sha.",
                "That's a lot of stamps in a passport...",
                "And a lot of short-circuited hearts. ⚡",
                "You’re a dangerous combination, you know?",
                "Too smart for the average, too pretty for the rest."
            ];

            const display = document.getElementById('message-display');
            for (let msg of jokes) {
                display.style.opacity = "0";
                await sleep(1200);
                display.textContent = msg;
                display.style.opacity = "1";
                await sleep(4500); // Very slow, lingering messages
            }

            document.getElementById('final-trigger').style.opacity = "1";
        }

        async function openFinal() {
            const slide = document.getElementById('final-slide');
            slide.style.display = 'flex';
            const textContainer = document.getElementById('final-text');
            const finalMsg = "To the girl who masters circuits and conquers horizons... \n\n Happy Birthday, Aayushi Sha! \n\n Keep exploring, keep glowing, and maybe—just for today—let someone else try to keep up with you. 😉🎂";
            
            for (let char of finalMsg) {
                textContainer.textContent += char;
                await sleep(60);
            }
        }

        function initStars() {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let stars = Array.from({length: 150}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                z: Math.random() * canvas.width
            }));

            function move() {
                ctx.fillStyle = "rgba(8, 1, 10, 0.2)";
                ctx.fillRect(0,0,canvas.width, canvas.height);
                stars.forEach(s => {
                    s.z -= 2;
                    if (s.z <= 0) s.z = canvas.width;
                    let sx = (s.x - canvas.width/2) * (canvas.width/s.z) + canvas.width/2;
                    let sy = (s.y - canvas.height/2) * (canvas.width/s.z) + canvas.height/2;
                    let size = (1 - s.z/canvas.width) * 3;
                    ctx.fillStyle = "#08d9d6";
                    ctx.beginPath();
                    ctx.arc(sx, sy, size, 0, Math.PI*2);
                    ctx.fill();
                });
                requestAnimationFrame(move);
            }
            move();
        }

        startFlow();
    </script>
    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</body>
</html>
